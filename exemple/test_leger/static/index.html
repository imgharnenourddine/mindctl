<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>mindctl — Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; margin: 20px; }
        h1 { color: #00a8ff; border-bottom: 2px solid #0066cc; padding-bottom: 10px; }
        section { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button { background: #0066cc; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-right: 10px; transition: 0.3s; }
        button:hover { background: #004a99; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0f3460; }
        th, td { border: 1px solid #1a1a2e; padding: 12px; text-align: left; }
        th { background: #0066cc; }
        pre { background: #0f0f0f; padding: 15px; border-left: 4px solid #00a8ff; overflow-x: auto; color: #00ff00; }
        .card { padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 5px solid; background: #232946; }
        .critique { border-color: #e94560; }
        .warning { border-color: #ffa500; }
        .code-diff { font-family: monospace; font-size: 0.9em; margin-top: 5px; }
        .red { color: #e94560; }
        .green { color: #4caf50; }
    </style>
</head>
<body>

    <h1>mindctl — Dashboard de monitoring</h1>

    <section>
        <h2>📊 Données nettoyées (Cleaner)</h2>
        <div id="table-buttons">Chargement des tables...</div>
        <div id="csv-result"></div>
    </section>

    <section>
        <h2>📈 Statistiques (Analyzer)</h2>
        <button onclick="fetchStats()">Voir les statistiques</button>
        <pre id="stats-content">Cliquez pour charger...</pre>
    </section>

    <section>
        <h2>🛡️ Conflits DevOps (Depguard)</h2>
        <button onclick="fetchDepguard()">Voir les conflits détectés</button>
        <div id="depguard-result"></div>
    </section>

    <script>
        const api = ""; // URL relative

        // Charger les tables au démarrage
        async function loadTables() {
            const res = await fetch(`${api}/api/tables`);
            const data = await res.json();
            const container = document.getElementById('table-buttons');
            container.innerHTML = data.tables.map(t => 
                `<button onclick="fetchCsv('${t}')">${t.toUpperCase()}</button>`
            ).join('') || "Aucun fichier CSV trouvé dans /tmp";
        }

        async function fetchCsv(table) {
            const res = await fetch(`${api}/api/csv/${table}`);
            const data = await res.json();
            let html = `<h3>Table: ${data.table} (${data.total_lignes} lignes)</h3><table><tr>`;
            html += data.colonnes.map(c => `<th>${c}</th>`).join('') + "</tr>";
            html += data.donnees.map(row => 
                "<tr>" + data.colonnes.map(c => `<td>${row[c]}</td>`).join('') + "</tr>"
            ).join('');
            html += "</table>";
            document.getElementById('csv-result').innerHTML = html;
        }

        async function fetchStats() {
            const res = await fetch(`${api}/api/stats`);
            const data = await res.json();
            document.getElementById('stats-content').textContent = data.stats;
        }

        async function fetchDepguard() {
            const res = await fetch(`${api}/api/depguard`);
            const data = await res.json();
            const container = document.getElementById('depguard-result');
            container.innerHTML = data.conflits.map(c => `
                <div class="card ${c.niveau.toLowerCase() === 'critique' ? 'critique' : 'warning'}">
                    <strong>[${c.niveau}]</strong> ${c.description}<br>
                    <small>Fichier: ${c.fichier}</small>
                    <div class="code-diff">
                        <div class="red">- ${c.ligne_avant}</div>
                        <div class="green">+ ${c.ligne_apres}</div>
                    </div>
                </div>
            `).join('') || "Aucun conflit détecté.";
        }

        window.onload = loadTables;
    </script>
</body>
</html>
